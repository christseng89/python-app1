name: mirror-cli-binaries

# One-shot mirror workflow.
#
# Copies CLI binaries from GitHub Releases (slow from Asia, especially for
# arm64 binaries) to Docker Hub (fast Cloudflare CDN with Asia POPs).
#
# Versions are sourced from repository variables (Settings → Variables):
#   ARGOCD_VERSION, YQ_VERSION, KUBECTL_VERSION
# The inputs below override those variables for a single run — leave them
# blank to use the repo variable value. Run this whenever you update a
# repo variable so the Docker Hub mirror stays in sync with cicd.yaml.

on:
  workflow_dispatch:
    inputs:
      argocd_version:
        description: "ArgoCD version to mirror. Leave blank to use ARGOCD_VERSION repo variable."
        required: false
        default: ""
      yq_version:
        description: "yq version to mirror. Leave blank to use YQ_VERSION repo variable."
        required: false
        default: ""
      kubectl_version:
        description: "kubectl version to mirror. Leave blank to use KUBECTL_VERSION repo variable."
        required: false
        default: ""

permissions:
  contents: read

jobs:
  mirror:
    # GitHub-hosted runner — fast egress to both GitHub Releases and Docker Hub
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Required to build a multi-arch manifest list (amd64 + arm64) from a
      # single amd64 GitHub-hosted runner.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Mirror ArgoCD CLI (amd64 + arm64)
        if: ${{ inputs.argocd_version != '' || vars.ARGOCD_VERSION != '' }}
        env:
          VERSION: ${{ inputs.argocd_version || vars.ARGOCD_VERSION }}
        run: |
          set -euo pipefail
          mkdir -p ctx-argocd && cd ctx-argocd
          for arch in amd64 arm64; do
            echo "Downloading argocd ${VERSION} ${arch}..."
            time curl -fSL --retry 3 --retry-delay 5 -o "argocd-${arch}" \
              "https://github.com/argoproj/argo-cd/releases/download/${VERSION}/argocd-linux-${arch}"
            chmod +x "argocd-${arch}"
          done
          # CMD is required so consumers can `docker create` without supplying
          # an arg. The binary itself doesn't run as a container (FROM scratch
          # has no shell or libc to support a TTY), but setting CMD satisfies
          # the docker daemon's "no command specified" check.
          cat > Dockerfile <<'DOCKERFILE'
          FROM scratch
          ARG TARGETARCH
          COPY argocd-${TARGETARCH} /argocd
          CMD ["/argocd"]
          DOCKERFILE
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --tag christseng89/argocd-bin:${VERSION} \
            --push \
            .
          echo "::notice::Mirrored christseng89/argocd-bin:${VERSION} (amd64+arm64)"

      - name: Mirror yq (amd64 + arm64)
        if: ${{ inputs.yq_version != '' || vars.YQ_VERSION != '' }}
        env:
          VERSION: ${{ inputs.yq_version || vars.YQ_VERSION }}
        run: |
          set -euo pipefail
          mkdir -p ctx-yq && cd ctx-yq
          for arch in amd64 arm64; do
            echo "Downloading yq ${VERSION} ${arch}..."
            time curl -fSL --retry 3 --retry-delay 5 -o "yq-${arch}" \
              "https://github.com/mikefarah/yq/releases/download/${VERSION}/yq_linux_${arch}"
            chmod +x "yq-${arch}"
          done
          cat > Dockerfile <<'DOCKERFILE'
          FROM scratch
          ARG TARGETARCH
          COPY yq-${TARGETARCH} /yq
          CMD ["/yq"]
          DOCKERFILE
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --tag christseng89/yq-bin:${VERSION} \
            --push \
            .
          echo "::notice::Mirrored christseng89/yq-bin:${VERSION} (amd64+arm64)"

      - name: Mirror kubectl (amd64 + arm64)
        if: ${{ inputs.kubectl_version != '' || vars.KUBECTL_VERSION != '' }}
        env:
          VERSION: ${{ inputs.kubectl_version || vars.KUBECTL_VERSION }}
        run: |
          set -euo pipefail
          mkdir -p ctx-kubectl && cd ctx-kubectl
          for arch in amd64 arm64; do
            echo "Downloading kubectl ${VERSION} ${arch}..."
            time curl -fSL --retry 3 --retry-delay 5 \
              -o "kubectl-${arch}" \
              "https://dl.k8s.io/release/${VERSION}/bin/linux/${arch}/kubectl"
            chmod +x "kubectl-${arch}"
          done
          cat > Dockerfile <<'DOCKERFILE'
          FROM scratch
          ARG TARGETARCH
          COPY kubectl-${TARGETARCH} /kubectl
          CMD ["/kubectl"]
          DOCKERFILE
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --tag christseng89/kubectl-bin:${VERSION} \
            --push \
            .
          echo "::notice::Mirrored christseng89/kubectl-bin:${VERSION} (amd64+arm64)"

      # When an input override is provided, write it back to the repo variable
      # so cicd.yaml stays in sync without a manual Settings update.
      - name: Update repo variables
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ -n "${{ inputs.argocd_version }}" ]; then
            gh variable set ARGOCD_VERSION --body "${{ inputs.argocd_version }}" --repo ${{ github.repository }}
            echo "::notice::Updated ARGOCD_VERSION → ${{ inputs.argocd_version }}"
          fi
          if [ -n "${{ inputs.yq_version }}" ]; then
            gh variable set YQ_VERSION --body "${{ inputs.yq_version }}" --repo ${{ github.repository }}
            echo "::notice::Updated YQ_VERSION → ${{ inputs.yq_version }}"
          fi
          if [ -n "${{ inputs.kubectl_version }}" ]; then
            gh variable set KUBECTL_VERSION --body "${{ inputs.kubectl_version }}" --repo ${{ github.repository }}
            echo "::notice::Updated KUBECTL_VERSION → ${{ inputs.kubectl_version }}"
          fi

      - name: Summary
        if: always()
        run: |
          cat <<EOF >> "$GITHUB_STEP_SUMMARY"
          ## Mirror complete
          | Image | Tag | Pull command |
          |---|---|---|
          | argocd | ${{ inputs.argocd_version || vars.ARGOCD_VERSION || '_(skipped)_' }} | \`docker pull christseng89/argocd-bin:${{ inputs.argocd_version || vars.ARGOCD_VERSION }}\` |
          | yq | ${{ inputs.yq_version || vars.YQ_VERSION || '_(skipped)_' }} | \`docker pull christseng89/yq-bin:${{ inputs.yq_version || vars.YQ_VERSION }}\` |
          | kubectl | ${{ inputs.kubectl_version || vars.KUBECTL_VERSION || '_(skipped)_' }} | \`docker pull christseng89/kubectl-bin:${{ inputs.kubectl_version || vars.KUBECTL_VERSION }}\` |
          EOF
